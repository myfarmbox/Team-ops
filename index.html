<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>MyFarmBox Ops</title>

  <meta name="theme-color" content="#1a2e1a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="MFB Ops">

  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="logo.png">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,500&family=DM+Sans:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">

  <style>
    :root {
      --green-900: #0d1f0d;
      --green-800: #1a2e1a;
      --green-700: #243d24;
      --green-600: #2f5230;
      --green-500: #3d6b3e;
      --green-400: #5a9b5c;
      --green-300: #7ec080;
      --green-100: #d4ebd4;
      --green-50:  #eef6ee;

      --amber: #c98a2e;
      --amber-light: #f5c97a;
      --cream: #f7f4ee;
      --cream-dark: #ede8df;
      --text-primary: #1a2e1a;
      --text-secondary: #4a6b4a;
      --text-muted: #7a9b7a;
      --text-on-dark: #e8f0e8;

      --card-bg: #ffffff;
      --card-border: rgba(45, 80, 45, 0.10);
      --shadow-sm: 0 1px 3px rgba(20,45,20,0.07), 0 1px 2px rgba(20,45,20,0.04);
      --shadow-md: 0 4px 16px rgba(20,45,20,0.10), 0 2px 6px rgba(20,45,20,0.06);
      --shadow-lg: 0 12px 40px rgba(20,45,20,0.14), 0 4px 12px rgba(20,45,20,0.08);

      --radius-sm: 10px;
      --radius-md: 16px;
      --radius-lg: 22px;
      --radius-xl: 28px;

      --font-display: 'Fraunces', Georgia, serif;
      --font-body: 'DM Sans', system-ui, sans-serif;
      --font-mono: 'IBM Plex Mono', monospace;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html {
      -webkit-text-size-adjust: 100%;
      height: 100%;
    }

    body {
      font-family: var(--font-body);
      background: var(--cream);
      color: var(--text-primary);
      min-height: 100vh;
      min-height: 100dvh;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }

    /* ─── Background texture ─── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 50% -10%, rgba(62,107,62,0.12) 0%, transparent 70%),
        radial-gradient(ellipse 60% 40% at 100% 100%, rgba(62,107,62,0.07) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
    }

    /* ─── Boot Loader ─── */
    .boot-loader {
      position: fixed;
      inset: 0;
      background: var(--green-800);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      transition: opacity 0.5s ease, visibility 0.5s ease;
    }
    .boot-loader.done {
      opacity: 0;
      visibility: hidden;
    }
    .boot-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
    }
    .boot-logo {
      width: 80px;
      height: 80px;
      border-radius: 20px;
      animation: bootPulse 1.5s ease-in-out infinite;
    }
    .boot-ring {
      width: 36px;
      height: 36px;
      border: 2.5px solid rgba(255,255,255,0.15);
      border-top-color: rgba(255,255,255,0.7);
      border-radius: 50%;
      animation: spin 0.9s linear infinite;
    }
    @keyframes bootPulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.8; transform: scale(0.97); }
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ─── Status Toast ─── */
    .status-toast {
      position: fixed;
      top: 16px;
      left: 50%;
      transform: translateX(-50%) translateY(-80px);
      background: var(--green-800);
      color: var(--text-on-dark);
      padding: 10px 18px;
      border-radius: 100px;
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.02em;
      display: flex;
      align-items: center;
      gap: 8px;
      z-index: 8000;
      transition: transform 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
      box-shadow: var(--shadow-md);
      white-space: nowrap;
    }
    .status-toast.show { transform: translateX(-50%) translateY(0); }
    .status-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--green-300);
      flex-shrink: 0;
      animation: dotPulse 2s ease infinite;
    }
    .status-toast.error .status-dot { background: #e07070; animation: none; }
    @keyframes dotPulse {
      0%, 100% { opacity: 1; } 50% { opacity: 0.4; }
    }

    /* ─── Overlay ─── */
    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(13, 31, 13, 0.65);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 7000;
      opacity: 0;
      visibility: hidden;
      transition: opacity 0.25s ease, visibility 0.25s ease;
    }
    .overlay.show { opacity: 1; visibility: visible; }
    .overlay-card {
      background: var(--card-bg);
      border-radius: var(--radius-lg);
      padding: 32px 40px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      box-shadow: var(--shadow-lg);
    }
    .spinner {
      width: 32px; height: 32px;
      border: 3px solid var(--green-100);
      border-top-color: var(--green-500);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    .overlay-label {
      font-size: 14px;
      font-weight: 500;
      color: var(--text-secondary);
      letter-spacing: 0.02em;
    }

    /* ─── App Shell ─── */
    .app-shell {
      position: relative;
      z-index: 1;
      max-width: 480px;
      margin: 0 auto;
      padding: 0 0 env(safe-area-inset-bottom);
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    /* ─── Brand Header ─── */
    .brand-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 20px 12px;
    }
    .brand-logo {
      width: 60px;
      height: 60px;
      border-radius: 15px;
      display: block;
      box-shadow: var(--shadow-sm);
    }
    .brand-logo-fallback {
      width: 60px;
      height: 60px;
      border-radius: 15px;
      background: var(--green-700);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .install-btn {
      font-family: var(--font-body);
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: var(--green-600);
      background: transparent;
      border: 1.5px solid var(--green-400);
      border-radius: 100px;
      padding: 7px 16px;
      cursor: pointer;
      transition: all 0.2s ease;
    }
    .install-btn:hover { background: var(--green-600); color: #fff; border-color: var(--green-600); }
    .hidden { display: none !important; }

    /* ─── Login Card ─── */
    .login-card {
      margin: 8px 16px 16px;
      background: var(--card-bg);
      border-radius: var(--radius-xl);
      padding: 32px 24px 24px;
      box-shadow: var(--shadow-md);
      border: 1px solid var(--card-border);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
    }

    .login-label {
      font-family: var(--font-display);
      font-size: 22px;
      font-weight: 400;
      color: var(--text-primary);
      margin-bottom: 6px;
      letter-spacing: -0.01em;
    }
    .login-sub {
      font-size: 13px;
      color: var(--text-muted);
      margin-bottom: 28px;
    }

    .pin-input {
      position: absolute;
      opacity: 0;
      pointer-events: none;
      width: 1px; height: 1px;
    }

    .pin-dots {
      display: flex;
      gap: 14px;
      margin-bottom: 28px;
    }
    .pin-dot {
      width: 13px; height: 13px;
      border-radius: 50%;
      border: 2px solid var(--green-300);
      background: transparent;
      transition: all 0.15s ease;
    }
    .pin-dot.filled {
      background: var(--green-600);
      border-color: var(--green-600);
      transform: scale(1.1);
    }
    .pin-dot.error {
      border-color: #e07070;
      background: #e07070;
      animation: shake 0.4s ease;
    }
    @keyframes shake {
      0%,100% { transform: translateX(0); }
      20% { transform: translateX(-4px); }
      40% { transform: translateX(4px); }
      60% { transform: translateX(-4px); }
      80% { transform: translateX(2px); }
    }

    .numpad {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      width: 100%;
      max-width: 280px;
    }
    .numpad-key {
      font-family: var(--font-body);
      font-size: 20px;
      font-weight: 500;
      color: var(--text-primary);
      background: var(--cream);
      border: none;
      border-radius: var(--radius-sm);
      padding: 16px 0;
      cursor: pointer;
      transition: all 0.12s ease;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }
    .numpad-key:active { transform: scale(0.94); background: var(--cream-dark); }
    .numpad-key-muted {
      font-size: 13px;
      font-weight: 600;
      color: var(--text-muted);
      letter-spacing: 0.03em;
    }
    .numpad-key-accent {
      background: var(--green-600);
      color: #fff;
      font-size: 15px;
      font-weight: 600;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }
    .numpad-key-accent:active { background: var(--green-700); }

    .error-text {
      margin-top: 16px;
      font-size: 12.5px;
      color: #c0504a;
      font-weight: 500;
      min-height: 18px;
      text-align: center;
    }

    /* ─── User Card ─── */
    .user-card {
      margin: 8px 16px 0;
      background: var(--green-800);
      border-radius: var(--radius-lg);
      padding: 16px 18px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: var(--shadow-md);
      animation: slideDown 0.3s ease;
    }
    @keyframes slideDown {
      from { opacity: 0; transform: translateY(-8px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .user-avatar {
      width: 36px; height: 36px;
      border-radius: 50%;
      background: rgba(255,255,255,0.12);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .user-meta-wrap {
      display: flex;
      align-items: center;
      gap: 12px;
      flex: 1;
    }
    .user-meta { flex: 1; }
    .user-name {
      font-family: var(--font-display);
      font-size: 17px;
      font-weight: 400;
      color: var(--text-on-dark);
      letter-spacing: -0.01em;
    }
    .user-role {
      font-size: 11px;
      color: var(--green-300);
      font-weight: 500;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      margin-top: 1px;
    }
    .logout-btn {
      font-family: var(--font-body);
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.6);
      background: transparent;
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 100px;
      padding: 6px 14px;
      cursor: pointer;
      transition: all 0.2s ease;
    }
    .logout-btn:hover { border-color: rgba(255,255,255,0.5); color: #fff; }

    /* ─── Section Label ─── */
    .section-label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-muted);
      padding: 20px 20px 8px;
    }

    /* ─── Tools Grid ─── */
    .tools-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      padding: 4px 16px 16px;
      flex: 1;
    }

    /* ─── Tool Card ─── */
    .tool-card {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: var(--radius-lg);
      padding: 20px 16px 18px;
      cursor: pointer;
      text-decoration: none;
      display: flex;
      flex-direction: column;
      gap: 14px;
      transition: transform 0.18s ease, box-shadow 0.18s ease, border-color 0.18s ease;
      -webkit-tap-highlight-color: transparent;
      box-shadow: var(--shadow-sm);
      animation: cardIn 0.35s ease both;
      position: relative;
      overflow: hidden;
    }
    .tool-card::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, transparent 60%, rgba(62,107,62,0.04));
      pointer-events: none;
    }
    .tool-card:hover, .tool-card:focus-visible {
      transform: translateY(-2px);
      box-shadow: var(--shadow-md);
      border-color: rgba(62,107,62,0.2);
      outline: none;
    }
    .tool-card:active { transform: scale(0.97); box-shadow: var(--shadow-sm); }

    .tool-card:nth-child(1) { animation-delay: 0.05s; }
    .tool-card:nth-child(2) { animation-delay: 0.1s; }
    .tool-card:nth-child(3) { animation-delay: 0.15s; }
    .tool-card:nth-child(4) { animation-delay: 0.2s; }
    .tool-card:nth-child(5) { animation-delay: 0.25s; }
    .tool-card:nth-child(6) { animation-delay: 0.3s; }
    .tool-card:nth-child(7) { animation-delay: 0.35s; }
    .tool-card:nth-child(8) { animation-delay: 0.4s; }

    @keyframes cardIn {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* ─── Tool Icon Container ─── */
    .tool-icon-wrap {
      width: 44px;
      height: 44px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .tool-icon-wrap svg {
      width: 22px;
      height: 22px;
      display: block;
      flex-shrink: 0;
    }

    /* Icon color themes */
    .icon-green { background: #e8f5e8; color: #2f6b30; }
    .icon-amber { background: #fdf3e0; color: #b87a1a; }
    .icon-blue  { background: #e3eefa; color: #2555a0; }
    .icon-teal  { background: #e0f4f0; color: #1a7a6a; }
    .icon-purple{ background: #f0ecfa; color: #5a35a0; }
    .icon-rose  { background: #fce8e8; color: #a02020; }
    .icon-slate { background: #eaeeef; color: #3a4f5a; }
    .icon-lime  { background: #eef7e0; color: #4a7a10; }

    .tool-name {
      font-size: 14px;
      font-weight: 600;
      color: var(--text-primary);
      line-height: 1.3;
      letter-spacing: -0.01em;
    }
    .tool-name.active-green { color: var(--green-600); }
    .tool-name.active-amber { color: var(--amber); }
    .tool-name.active-blue  { color: #2555a0; }
    .tool-name.active-teal  { color: #1a7a6a; }

    .tool-arrow {
      position: absolute;
      top: 14px;
      right: 14px;
      opacity: 0.2;
      transition: opacity 0.2s ease, transform 0.2s ease;
    }
    .tool-card:hover .tool-arrow { opacity: 0.5; transform: translate(1px, -1px); }

    /* ─── Empty State ─── */
    .empty-state {
      text-align: center;
      color: var(--text-muted);
      font-size: 14px;
      padding: 40px 20px;
      grid-column: 1/-1;
    }

    /* ─── Footer ─── */
    .footer {
      padding: 12px 16px calc(12px + env(safe-area-inset-bottom));
      border-top: 1px solid var(--card-border);
      background: rgba(247,244,238,0.9);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
    }
    .footer-actions {
      display: flex;
      gap: 8px;
      margin-bottom: 10px;
    }
    .footer-btn {
      flex: 1;
      font-family: var(--font-body);
      font-size: 12.5px;
      font-weight: 600;
      text-align: center;
      text-decoration: none;
      letter-spacing: 0.03em;
      padding: 10px 0;
      border-radius: var(--radius-sm);
      transition: all 0.18s ease;
    }
    .quick-btn {
      background: var(--cream-dark);
      color: var(--text-secondary);
      border: 1px solid var(--card-border);
    }
    .quick-btn:hover { background: var(--green-100); color: var(--green-700); }
    .footer-meta {
      display: flex;
      align-items: center;
      gap: 8px;
      font-family: var(--font-mono);
      font-size: 10px;
      color: var(--text-muted);
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }
    .footer-meta span::after {
      content: '·';
      margin-left: 8px;
      opacity: 0.4;
    }
    .footer-meta span:last-child::after { display: none; }
    .footer-status {
      color: var(--green-500);
      font-weight: 500;
    }
    .footer-status.inactive { color: var(--text-muted); }
    .clock { font-variant-numeric: tabular-nums; }

    /* Responsive: single column on very narrow */
    @media (max-width: 320px) {
      .tools-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

  <!-- Boot Loader -->
  <div id="bootLoader" class="boot-loader">
    <div class="boot-card">
      <img src="logo.png" class="boot-logo" alt="MyFarmBox"
           onerror="this.style.display='none'; document.querySelector('.boot-ring').style.marginTop='0'">
      <div class="boot-ring"></div>
    </div>
  </div>

  <!-- Status Toast -->
  <div id="statusToast" class="status-toast">
    <span class="status-dot"></span>
    <span id="statusText">Loading…</span>
  </div>

  <!-- Loading Overlay -->
  <div id="overlay" class="overlay">
    <div class="overlay-card">
      <div class="spinner"></div>
      <div id="overlayLabel" class="overlay-label">Authenticating</div>
    </div>
  </div>

  <main class="app-shell">

    <!-- Header -->
    <header class="brand-header">
      <img src="logo.png" alt="MyFarmBox Logo" class="brand-logo"
           onerror="this.outerHTML='<div class=\'brand-logo-fallback\'><svg width=\'28\' height=\'28\' viewBox=\'0 0 24 24\' fill=\'none\' stroke=\'#7ec080\' stroke-width=\'1.8\'><path d=\'M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2z\'/></svg></div>'">
      <button id="installBtn" class="install-btn hidden" type="button">Install App</button>
    </header>

    <!-- Login -->
    <section id="loginCard" class="login-card">
      <p class="login-label">Welcome back</p>
      <p class="login-sub">Enter your PIN to continue</p>

      <input id="pinInput" class="pin-input" type="password"
             inputmode="numeric" autocomplete="one-time-code" maxlength="12" aria-label="PIN">

      <div id="pinDots" class="pin-dots" aria-hidden="true">
        <span class="pin-dot"></span>
        <span class="pin-dot"></span>
        <span class="pin-dot"></span>
        <span class="pin-dot"></span>
      </div>

      <div class="numpad" aria-label="PIN keypad">
        <button class="numpad-key" type="button" data-key="1">1</button>
        <button class="numpad-key" type="button" data-key="2">2</button>
        <button class="numpad-key" type="button" data-key="3">3</button>
        <button class="numpad-key" type="button" data-key="4">4</button>
        <button class="numpad-key" type="button" data-key="5">5</button>
        <button class="numpad-key" type="button" data-key="6">6</button>
        <button class="numpad-key" type="button" data-key="7">7</button>
        <button class="numpad-key" type="button" data-key="8">8</button>
        <button class="numpad-key" type="button" data-key="9">9</button>
        <button id="clearBtn" class="numpad-key numpad-key-muted" type="button">Clear</button>
        <button class="numpad-key" type="button" data-key="0">0</button>
        <button id="loginBtn" class="numpad-key numpad-key-accent" type="button">Go</button>
      </div>

      <div id="errorText" class="error-text"></div>
    </section>

    <!-- User Card -->
    <section id="userCard" class="user-card hidden">
      <div class="user-meta-wrap">
        <div class="user-avatar">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.8)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>
          </svg>
        </div>
        <div class="user-meta">
          <div id="userName" class="user-name">-</div>
          <div id="userRole" class="user-role">-</div>
        </div>
      </div>
      <button id="logoutBtn" class="logout-btn" type="button">Logout</button>
    </section>

    <!-- Section label shown after login -->
    <div id="sectionLabel" class="section-label hidden">Your Tools</div>

    <!-- Empty state -->
    <section id="emptyState" class="empty-state hidden">No tools available for your role.</section>

    <!-- Tools Grid -->
    <section id="toolsGrid" class="tools-grid"></section>

    <!-- Footer -->
    <footer class="footer">
      <div class="footer-actions">
        <a class="footer-btn quick-btn" href="tel:7448444681">
          Call Admin
        </a>
        <a class="footer-btn quick-btn" href="mailto:ajeeth@myfarmbox.in?subject=MyFarmBox%20Ops">
          Email Support
        </a>
      </div>
      <div class="footer-meta">
        <span id="clock" class="clock">--:-- --</span>
        <span id="dateLine">-- --- ----</span>
        <span id="footerStatus" class="footer-status inactive">Awaiting login</span>
      </div>
    </footer>
  </main>

  <script>
    // ── SVG icons for each tool (inline, no emoji dependency) ──
    const TOOL_ICONS = {
      harvest: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 22V12"/><path d="M5 12c0-3.87 3.13-7 7-7s7 3.13 7 7"/>
        <path d="M5 12H2l3-5 3 5"/><path d="M19 12h3l-3-5-3 5"/>
        <path d="M12 5V2"/></svg>`,
      consolidation: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="3" width="7" height="5" rx="1"/><rect x="14" y="3" width="7" height="5" rx="1"/>
        <rect x="3" y="13" width="7" height="5" rx="1"/><rect x="14" y="13" width="7" height="5" rx="1"/>
        <path d="M10 5.5h4M10 15.5h4M6.5 8v5M17.5 8v5"/></svg>`,
      delivery: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M1 3h15v13H1z"/><path d="M16 8h4l3 4v5h-7V8z"/>
        <circle cx="5.5" cy="18.5" r="2.5"/><circle cx="18.5" cy="18.5" r="2.5"/>
        <path d="M8 18.5h7"/></svg>`,
      attendance: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/>
        <path d="M9 16l2 2 4-4"/></svg>`,
      members: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="9" cy="7" r="4"/><path d="M2 21c0-4 3.13-7 7-7"/>
        <circle cx="17" cy="11" r="3"/><path d="M14 21c0-3 1.8-5 3-5s3 2 3 5"/></svg>`,
      farmpickup: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/>
        <path d="M9 22V12h6v10"/></svg>`,
      website: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="10"/>
        <path d="M2 12h20M12 2a15.3 15.3 0 014 10 15.3 15.3 0 01-4 10 15.3 15.3 0 01-4-10 15.3 15.3 0 014-10z"/></svg>`,
      reports: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/>
        <path d="M14 2v6h6M9 13h6M9 17h4"/></svg>`,
      link: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6"/>
        <polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>`
    };

    // ── Tool definitions (maps tool names from GAS to icons/colors) ──
    // This maps display names to icon keys and color themes
    const TOOL_META = [
      { match: /harvest/i,       icon: 'harvest',      colorWrap: 'icon-green',  colorText: 'active-green' },
      { match: /consolidat/i,    icon: 'consolidation',colorWrap: 'icon-slate',  colorText: '' },
      { match: /delivery/i,      icon: 'delivery',     colorWrap: 'icon-amber',  colorText: 'active-amber' },
      { match: /attendance/i,    icon: 'attendance',   colorWrap: 'icon-blue',   colorText: '' },
      { match: /member/i,        icon: 'members',      colorWrap: 'icon-teal',   colorText: '' },
      { match: /farm.?pickup|pickup/i, icon: 'farmpickup', colorWrap: 'icon-lime', colorText: 'active-teal' },
      { match: /website|list.?update/i, icon: 'website', colorWrap: 'icon-purple', colorText: 'active-teal' },
      { match: /report/i,        icon: 'reports',      colorWrap: 'icon-rose',   colorText: '' },
    ];

    function getToolMeta(name) {
      for (const m of TOOL_META) {
        if (m.match.test(name)) return m;
      }
      return { icon: 'link', colorWrap: 'icon-slate', colorText: '' };
    }

    // ── Clock ──
    function updateClock() {
      const now = new Date();
      const t = now.toLocaleTimeString('en-IN', { hour: '2-digit', minute: '2-digit', hour12: true }).toUpperCase();
      const d = now.toLocaleDateString('en-IN', { day: '2-digit', month: 'short', year: 'numeric' }).toUpperCase();
      document.getElementById('clock').textContent = t;
      document.getElementById('dateLine').textContent = d;
    }
    updateClock();
    setInterval(updateClock, 30000);

    // ── Boot loader hide ──
    window.addEventListener('load', () => {
      setTimeout(() => {
        document.getElementById('bootLoader').classList.add('done');
      }, 600);
    });

    // ── Toast ──
    let toastTimer;
    function showToast(msg, isError = false) {
      const t = document.getElementById('statusToast');
      const s = document.getElementById('statusText');
      s.textContent = msg;
      t.classList.toggle('error', isError);
      t.classList.add('show');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => t.classList.remove('show'), 3000);
    }

    // ── Overlay ──
    function showOverlay(label = 'Loading') {
      document.getElementById('overlayLabel').textContent = label;
      document.getElementById('overlay').classList.add('show');
    }
    function hideOverlay() {
      document.getElementById('overlay').classList.remove('show');
    }

    // ── PIN logic ──
    const pinInput  = document.getElementById('pinInput');
    const pinDots   = document.querySelectorAll('.pin-dot');
    const errorText = document.getElementById('errorText');
    let pinBuffer   = '';

    function updateDots() {
      pinDots.forEach((d, i) => {
        d.classList.toggle('filled', i < pinBuffer.length);
        d.classList.remove('error');
      });
    }

    function flashError(msg) {
      errorText.textContent = msg;
      pinDots.forEach(d => { d.classList.remove('filled'); d.classList.add('error'); });
      setTimeout(() => { pinBuffer = ''; updateDots(); }, 700);
    }

    document.querySelectorAll('[data-key]').forEach(btn => {
      btn.addEventListener('click', () => {
        if (pinBuffer.length < 12) {
          pinBuffer += btn.dataset.key;
          updateDots();
          pinInput.value = pinBuffer;
        }
      });
    });

    document.getElementById('clearBtn').addEventListener('click', () => {
      pinBuffer = '';
      pinInput.value = '';
      updateDots();
      errorText.textContent = '';
    });

    document.getElementById('loginBtn').addEventListener('click', doLogin);

    function doLogin() {
      if (!pinBuffer) { flashError('Enter your PIN'); return; }
      showOverlay('Authenticating');
      // Delegate to your GAS backend — replace with your actual google.script.run call
      if (typeof google !== 'undefined' && google.script) {
        google.script.run
          .withSuccessHandler(onLoginSuccess)
          .withFailureHandler(onLoginFail)
          .verifyPin(pinBuffer);
      } else {
        // Dev/preview mode
        setTimeout(() => {
          hideOverlay();
          flashError('No backend connected');
        }, 800);
      }
    }

    function onLoginSuccess(result) {
      hideOverlay();
      if (!result || !result.ok) {
        flashError(result?.msg || 'Invalid PIN');
        return;
      }
      pinBuffer = '';
      pinInput.value = '';
      updateDots();
      errorText.textContent = '';
      document.getElementById('loginCard').classList.add('hidden');
      document.getElementById('userName').textContent = result.name || 'User';
      document.getElementById('userRole').textContent = result.role || 'Member';
      document.getElementById('userCard').classList.remove('hidden');
      document.getElementById('sectionLabel').classList.remove('hidden');
      document.getElementById('footerStatus').textContent = 'SECURE SESSION ACTIVE';
      document.getElementById('footerStatus').classList.remove('inactive');
      renderTools(result.apps || []);
    }

    function onLoginFail(err) {
      hideOverlay();
      flashError('Connection error');
      console.error(err);
    }

    // ── Logout ──
    document.getElementById('logoutBtn').addEventListener('click', () => {
      document.getElementById('userCard').classList.add('hidden');
      document.getElementById('sectionLabel').classList.add('hidden');
      document.getElementById('toolsGrid').innerHTML = '';
      document.getElementById('emptyState').classList.add('hidden');
      document.getElementById('loginCard').classList.remove('hidden');
      document.getElementById('footerStatus').textContent = 'Awaiting login';
      document.getElementById('footerStatus').classList.add('inactive');
      if (typeof google !== 'undefined' && google.script) {
        google.script.run.clearSession();
      }
    });

    // ── Render tool cards ──
    function renderTools(apps) {
      const grid = document.getElementById('toolsGrid');
      const empty = document.getElementById('emptyState');
      grid.innerHTML = '';
      if (!apps || apps.length === 0) {
        empty.classList.remove('hidden');
        return;
      }
      empty.classList.add('hidden');
      apps.forEach(app => {
        const meta = getToolMeta(app.name);
        const card = document.createElement('a');
        card.className = 'tool-card';
        card.href = app.url || '#';
        if (app.url) card.target = '_blank';
        card.rel = 'noopener';
        card.setAttribute('role', 'button');
        card.innerHTML = `
          <div class="tool-icon-wrap ${meta.colorWrap}">
            ${TOOL_ICONS[meta.icon] || TOOL_ICONS.link}
          </div>
          <div class="tool-name ${meta.colorText}">${app.name}</div>
          <div class="tool-arrow">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <line x1="7" y1="17" x2="17" y2="7"/><polyline points="7 7 17 7 17 17"/>
            </svg>
          </div>`;
        grid.appendChild(card);
      });
    }

    // ── PWA Install ──
    let deferredPrompt;
    window.addEventListener('beforeinstallprompt', e => {
      e.preventDefault();
      deferredPrompt = e;
      document.getElementById('installBtn').classList.remove('hidden');
    });
    document.getElementById('installBtn').addEventListener('click', async () => {
      if (!deferredPrompt) return;
      deferredPrompt.prompt();
      const { outcome } = await deferredPrompt.userChoice;
      if (outcome === 'accepted') document.getElementById('installBtn').classList.add('hidden');
      deferredPrompt = null;
    });

    // ── Check existing session on load ──
    if (typeof google !== 'undefined' && google.script) {
      showOverlay('Checking session');
      google.script.run
        .withSuccessHandler(result => {
          hideOverlay();
          if (result && result.ok) onLoginSuccess(result);
          else document.getElementById('bootLoader').classList.add('done');
        })
        .withFailureHandler(() => { hideOverlay(); })
        .getSession();
    }
  </script>
</body>
</html>
