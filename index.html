<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>MyFarmBox Ops</title>

  <meta name="theme-color" content="#1c3020">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="MFB Ops">

  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="logo.png">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,500&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { -webkit-text-size-adjust: 100%; height: 100%; }

    :root {
      --g900: #0d1f0d;
      --g800: #1c3020;
      --g700: #25422a;
      --g600: #2f5535;
      --g500: #3d6b43;
      --g400: #5a9b61;
      --g300: #80c488;
      --g100: #d2ecda;
      --g50:  #eef8f1;
      --amber:    #c08a28;
      --amber-bg: #fdf4e0;
      --cream:    #f6f3ec;
      --cream-2:  #ede8dc;
      --cream-3:  #e3ddd0;
      --white:    #fffdf6;
      --txt:      #1c3020;
      --txt-2:    #4a6b50;
      --txt-3:    #7a9b80;
      --danger:   #b84a3d;
      --gold:     #c08a28;
      --line:     rgba(30,60,35,0.11);
      --line-2:   rgba(30,60,35,0.18);
      --sh-sm: 0 1px 4px rgba(20,50,25,0.06), 0 1px 2px rgba(20,50,25,0.04);
      --sh-md: 0 4px 18px rgba(20,50,25,0.09), 0 2px 6px rgba(20,50,25,0.05);
      --sh-lg: 0 12px 40px rgba(20,50,25,0.13), 0 4px 14px rgba(20,50,25,0.07);
      --r-xl: 26px; --r-lg: 20px; --r-md: 14px; --r-sm: 10px;
      --ff-d: 'Fraunces', Georgia, serif;
      --ff-b: 'DM Sans', system-ui, sans-serif;
      --ff-m: 'IBM Plex Mono', monospace;
    }

    body {
      font-family: var(--ff-b);
      background: var(--cream);
      color: var(--txt);
      min-height: 100vh; min-height: 100dvh;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }
    body::before {
      content: '';
      position: fixed; inset: 0;
      background:
        radial-gradient(ellipse 90% 55% at 50% -5%, rgba(45,100,55,.11) 0%, transparent 65%),
        radial-gradient(ellipse 55% 35% at 95% 100%, rgba(45,100,55,.07) 0%, transparent 55%);
      pointer-events: none; z-index: 0;
    }

    /* Boot */
    .boot-loader {
      position: fixed; inset: 0; background: var(--g800);
      display: grid; place-items: center; z-index: 9999;
      transition: opacity .5s ease, visibility .5s ease;
    }
    .boot-loader.hidden { opacity: 0; visibility: hidden; pointer-events: none; }
    .boot-card { display: flex; flex-direction: column; align-items: center; gap: 22px; }
    .boot-logo { width: 88px; height: 88px; border-radius: 22px; object-fit: contain; animation: bootPulse 1.6s ease-in-out infinite; }
    .boot-ring { width: 32px; height: 32px; border: 2.5px solid rgba(255,255,255,.15); border-top-color: rgba(255,255,255,.75); border-radius: 50%; animation: spin .85s linear infinite; }
    @keyframes bootPulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.82;transform:scale(.96)} }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Overlay */
    .overlay {
      position: fixed; inset: 0; background: rgba(12,28,15,.6);
      backdrop-filter: blur(7px); -webkit-backdrop-filter: blur(7px);
      display: grid; place-items: center; z-index: 7000;
      opacity: 0; visibility: hidden;
      transition: opacity .22s ease, visibility .22s ease;
    }
    .overlay.show { opacity: 1; visibility: visible; }
    .overlay-card {
      background: var(--white); border-radius: var(--r-lg);
      padding: 30px 38px; display: flex; flex-direction: column; align-items: center; gap: 14px;
      box-shadow: var(--sh-lg);
    }
    .overlay-label { font-size: 13px; font-weight: 500; color: var(--txt-2); letter-spacing: .03em; }
    .spinner { width: 30px; height: 30px; border: 3px solid var(--g100); border-top-color: var(--g500); border-radius: 50%; animation: spin .75s linear infinite; }

    /* Toast */
    .status-toast {
      position: fixed; left: 50%; bottom: 24px;
      transform: translate(-50%, 16px);
      display: inline-flex; align-items: center; gap: 8px;
      padding: 10px 18px; border: 1px solid var(--line);
      border-radius: 999px; background: var(--white);
      box-shadow: var(--sh-md); font-size: 12.5px; font-weight: 500;
      opacity: 0; visibility: hidden;
      transition: opacity .2s ease, transform .25s cubic-bezier(.34,1.56,.64,1), visibility .2s ease;
      z-index: 8000; white-space: nowrap;
    }
    .status-toast.show { opacity: 1; visibility: visible; transform: translate(-50%, 0); }
    .status-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--g400); flex-shrink: 0; }
    .status-toast.error .status-dot { background: var(--danger); }

    /* Shell */
    .app-shell {
      position: relative; z-index: 1;
      width: min(100%, 520px); margin: 0 auto;
      padding: 0 0 calc(20px + env(safe-area-inset-bottom));
      min-height: 100dvh; display: flex; flex-direction: column;
    }

    /* Header */
    .brand-header {
      display: flex; align-items: center; justify-content: center;
      padding: 22px 20px 10px; position: relative;
    }
    .brand-logo { width: 120px; height: 120px; object-fit: contain; border-radius: 22px; display: block; }
    .install-btn {
      position: absolute; top: 22px; right: 20px;
      font-family: var(--ff-b); font-size: 11.5px; font-weight: 600;
      letter-spacing: .05em; text-transform: uppercase;
      color: var(--txt-2); background: var(--white);
      border: 1px solid var(--line-2); border-radius: 999px;
      padding: 7px 15px; cursor: pointer; box-shadow: var(--sh-sm);
      transition: all .18s ease;
    }
    .install-btn:hover { background: var(--g600); color: #fff; border-color: var(--g600); }
    .hidden { display: none !important; }

    /* Login */
    .login-card {
      margin: 10px 16px 0; background: var(--white);
      border: 1px solid var(--line); border-radius: var(--r-xl);
      padding: 28px 20px 22px; box-shadow: var(--sh-md);
      display: flex; flex-direction: column; align-items: center;
    }
    .login-heading { font-family: var(--ff-d); font-size: 21px; font-weight: 400; color: var(--txt); letter-spacing: -.01em; margin-bottom: 4px; }
    .login-sub { font-size: 12.5px; color: var(--txt-3); margin-bottom: 24px; }

    .pin-input { position: absolute; opacity: 0; pointer-events: none; width: 1px; height: 1px; }

    .pin-dots { display: grid; grid-template-columns: repeat(4,1fr); gap: 10px; width: 100%; margin-bottom: 16px; }
    .pin-dot { height: 54px; border-radius: var(--r-md); border: 1px solid var(--line); background: var(--cream); position: relative; transition: border-color .15s ease; }
    .pin-dot.filled::after { content: ''; position: absolute; inset: 50% auto auto 50%; width: 12px; height: 12px; border-radius: 50%; background: var(--g600); transform: translate(-50%,-50%); }
    .pin-dot.active { border-color: rgba(45,100,55,.4); }

    .numpad { display: grid; grid-template-columns: repeat(3,1fr); gap: 9px; width: 100%; }
    .numpad-key {
      height: 56px; font-family: var(--ff-b); font-size: 19px; font-weight: 600;
      color: var(--txt); background: var(--cream); border: 1px solid var(--line);
      border-radius: var(--r-md); cursor: pointer;
      transition: transform .12s ease, background .12s ease, border-color .12s ease;
      -webkit-tap-highlight-color: transparent; user-select: none;
      position: relative; overflow: hidden;
    }
    .numpad-key:hover  { border-color: var(--line-2); background: var(--cream-2); }
    .numpad-key:active { transform: scale(.95); background: var(--cream-3); }
    .numpad-key-muted  { font-size: 13px; font-weight: 600; color: var(--txt-3); letter-spacing: .03em; }
    .numpad-key-accent { background: var(--g600); border-color: var(--g600); color: #fff; font-size: 14px; letter-spacing: .06em; text-transform: uppercase; }
    .numpad-key-accent:hover  { background: var(--g700); border-color: var(--g700); }
    .numpad-key-accent:active { background: var(--g800); transform: scale(.95); }

    .error-text { min-height: 18px; margin-top: 12px; text-align: center; color: var(--danger); font-size: 12px; font-weight: 500; }

    /* User card */
    .user-card {
      margin: 14px 16px 0; background: var(--g800);
      border: 1px solid rgba(255,255,255,.06); border-radius: var(--r-lg);
      padding: 14px 16px; display: flex; align-items: center; justify-content: space-between; gap: 12px;
      box-shadow: var(--sh-md); animation: slideDown .3s ease both;
    }
    @keyframes slideDown { from{opacity:0;transform:translateY(-6px)} to{opacity:1;transform:translateY(0)} }
    .user-left { display: flex; align-items: center; gap: 12px; }
    .user-avatar { width: 36px; height: 36px; border-radius: 50%; background: rgba(255,255,255,.1); display: grid; place-items: center; flex-shrink: 0; }
    .user-name { font-family: var(--ff-d); font-size: 16px; font-weight: 400; color: #e8f4ea; letter-spacing: -.01em; }
    .user-role { font-size: 10.5px; font-weight: 600; color: var(--g300); letter-spacing: .07em; text-transform: uppercase; margin-top: 2px; }
    .logout-btn {
      font-family: var(--ff-b); font-size: 11.5px; font-weight: 600;
      letter-spacing: .05em; text-transform: uppercase;
      color: rgba(255,255,255,.55); background: transparent;
      border: 1px solid rgba(255,255,255,.18); border-radius: 999px;
      padding: 6px 14px; cursor: pointer; transition: all .2s ease; flex-shrink: 0;
    }
    .logout-btn:hover { border-color: rgba(255,255,255,.45); color: #fff; }

    .section-label { font-size: 10.5px; font-weight: 600; letter-spacing: .1em; text-transform: uppercase; color: var(--txt-3); padding: 18px 20px 6px; }

    .empty-state { color: var(--txt-3); font-size: 13px; text-align: center; padding: 36px 20px; grid-column: 1/-1; }

    /* Grid */
    .tools-grid { display: grid; grid-template-columns: repeat(2,minmax(0,1fr)); gap: 11px; padding: 4px 16px 18px; flex: 1; }

    /* Tool card */
    .tool-card {
      background: var(--white); border: 1px solid var(--line); border-radius: var(--r-lg);
      padding: 18px 16px; display: flex; flex-direction: column; gap: 14px; min-height: 128px;
      text-decoration: none; color: inherit; cursor: pointer; position: relative; overflow: hidden;
      box-shadow: var(--sh-sm);
      transition: transform .17s ease, box-shadow .17s ease, border-color .17s ease;
      -webkit-tap-highlight-color: transparent;
      animation: cardIn .35s ease both;
    }
    .tool-card::after { content: ''; position: absolute; inset: 0; background: linear-gradient(140deg,transparent 55%,rgba(40,90,50,.04)); pointer-events: none; }
    .tool-card:hover  { transform: translateY(-2px); box-shadow: var(--sh-md); border-color: var(--line-2); }
    .tool-card:active { transform: scale(.965); box-shadow: var(--sh-sm); }
    .tool-card:nth-child(1){animation-delay:.04s}.tool-card:nth-child(2){animation-delay:.09s}
    .tool-card:nth-child(3){animation-delay:.14s}.tool-card:nth-child(4){animation-delay:.19s}
    .tool-card:nth-child(5){animation-delay:.24s}.tool-card:nth-child(6){animation-delay:.29s}
    .tool-card:nth-child(7){animation-delay:.34s}.tool-card:nth-child(8){animation-delay:.39s}
    @keyframes cardIn { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }

    .tool-icon { width: 46px; height: 46px; border-radius: var(--r-sm); display: grid; place-items: center; flex-shrink: 0; }
    .tool-icon svg { width: 22px; height: 22px; display: block; flex-shrink: 0; }

    /* Icon colour themes — applied to card, styles icon+title */
    .i-green .tool-icon { background: #e6f5e8; color: #2d6b35; }
    .i-gold  .tool-icon { background: var(--amber-bg); color: var(--amber); }
    .i-teal  .tool-icon { background: #e0f4f0; color: #1a7a6a; }
    .i-navy  .tool-icon { background: #e4eaf5; color: #2a4580; }
    .i-earth .tool-icon { background: #f0ece4; color: #6a5030; }
    .i-lime  .tool-icon { background: #edf7e0; color: #4a7a10; }
    .i-rose  .tool-icon { background: #fce8e8; color: #a02828; }
    .i-slate .tool-icon { background: #eaeeef; color: #3a4f5a; }

    .tool-title { font-size: 14px; font-weight: 700; line-height: 1.3; letter-spacing: -.01em; color: var(--txt); }
    .i-green .tool-title { color: #2d6b35; }
    .i-gold  .tool-title { color: var(--amber); }
    .i-teal  .tool-title { color: #1a7a6a; }

    .tool-arrow { position: absolute; top: 14px; right: 14px; color: var(--txt-3); opacity: .3; transition: opacity .18s ease, transform .18s ease; }
    .tool-card:hover .tool-arrow { opacity: .6; transform: translate(1px,-1px); }

    /* Ripple */
    .ripple { position: absolute; border-radius: 50%; background: rgba(40,100,50,.1); transform: scale(0); animation: ripple .55s ease-out forwards; pointer-events: none; }
    @keyframes ripple { to { transform: scale(1); opacity: 0; } }

    /* Shake */
    .shake { animation: shake .28s ease; }
    @keyframes shake { 25%{transform:translateX(-4px)} 50%{transform:translateX(4px)} 75%{transform:translateX(-3px)} }

    /* Footer */
    .footer {
      margin: 2px 16px 0; background: rgba(255,253,246,.88);
      border: 1px solid var(--line); border-radius: var(--r-lg);
      padding: 12px 14px; box-shadow: var(--sh-sm);
      backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
    }
    .footer-actions { display: flex; gap: 8px; margin-bottom: 10px; }
    .footer-btn {
      flex: 1; display: inline-flex; align-items: center; justify-content: center;
      height: 38px; font-family: var(--ff-b); font-size: 12px; font-weight: 600;
      text-decoration: none; color: var(--txt-2); background: var(--cream);
      border: 1px solid var(--line); border-radius: var(--r-sm);
      cursor: pointer; transition: all .17s ease;
    }
    .footer-btn:hover  { background: var(--g100); color: var(--g700); border-color: rgba(45,100,55,.25); }
    .footer-btn:active { transform: scale(.96); }
    .footer-meta {
      display: flex; align-items: center; gap: 6px; flex-wrap: wrap;
      font-family: var(--ff-m); font-size: 9.5px; color: var(--txt-3);
      text-transform: uppercase; letter-spacing: .06em;
    }
    .footer-meta > * + *::before { content: '·'; margin-right: 6px; opacity: .4; }
    .footer-status { color: var(--g500); font-weight: 500; }

    @media (max-width: 400px) {
      .brand-logo { width: 100px; height: 100px; }
      .pin-dot { height: 48px; }
      .tool-card { min-height: 114px; padding: 14px 13px; gap: 11px; }
      .tool-icon { width: 40px; height: 40px; }
      .tool-icon svg { width: 19px; height: 19px; }
    }
    @media (max-width: 320px) {
      .tools-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

  <div id="bootLoader" class="boot-loader">
    <div class="boot-card">
      <img src="logo.png" class="boot-logo" alt="MyFarmBox" onerror="this.style.display='none'">
      <div class="boot-ring"></div>
    </div>
  </div>

  <div id="overlay" class="overlay">
    <div class="overlay-card">
      <div class="spinner"></div>
      <div id="overlayLabel" class="overlay-label">Loading</div>
    </div>
  </div>

  <div id="statusToast" class="status-toast">
    <span class="status-dot"></span>
    <span id="statusText">Loading…</span>
  </div>

  <main class="app-shell">

    <header class="brand-header">
      <img src="logo.png" alt="MyFarmBox Logo" class="brand-logo" onerror="this.style.display='none'">
      <button id="installBtn" class="install-btn hidden" type="button">Install App</button>
    </header>

    <section id="loginCard" class="login-card">
      <p class="login-heading">Welcome back</p>
      <p class="login-sub">Enter your PIN to continue</p>
      <input id="pinInput" class="pin-input" type="password"
             inputmode="numeric" autocomplete="one-time-code" maxlength="12" aria-label="PIN">
      <div id="pinDots" class="pin-dots" aria-hidden="true">
        <span class="pin-dot"></span><span class="pin-dot"></span>
        <span class="pin-dot"></span><span class="pin-dot"></span>
      </div>
      <div class="numpad" aria-label="PIN keypad">
        <button class="numpad-key" type="button" data-key="1">1</button>
        <button class="numpad-key" type="button" data-key="2">2</button>
        <button class="numpad-key" type="button" data-key="3">3</button>
        <button class="numpad-key" type="button" data-key="4">4</button>
        <button class="numpad-key" type="button" data-key="5">5</button>
        <button class="numpad-key" type="button" data-key="6">6</button>
        <button class="numpad-key" type="button" data-key="7">7</button>
        <button class="numpad-key" type="button" data-key="8">8</button>
        <button class="numpad-key" type="button" data-key="9">9</button>
        <button id="clearBtn" class="numpad-key numpad-key-muted" type="button">Clear</button>
        <button class="numpad-key" type="button" data-key="0">0</button>
        <button id="loginBtn" class="numpad-key numpad-key-accent" type="button">Go</button>
      </div>
      <div id="errorText" class="error-text"></div>
    </section>

    <section id="userCard" class="user-card hidden">
      <div class="user-left">
        <div class="user-avatar">
          <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.75)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>
          </svg>
        </div>
        <div>
          <div id="userName" class="user-name">-</div>
          <div id="userRole" class="user-role">-</div>
        </div>
      </div>
      <button id="logoutBtn" class="logout-btn" type="button">Logout</button>
    </section>

    <div id="sectionLabel" class="section-label hidden">Your Tools</div>
    <section id="emptyState" class="empty-state hidden">No tools available.</section>
    <section id="toolsGrid" class="tools-grid"></section>

    <footer class="footer">
      <div class="footer-actions">
        <a class="footer-btn quick-btn" href="tel:7448444681">Call Admin</a>
        <a class="footer-btn quick-btn" href="mailto:ajeeth@myfarmbox.in?subject=MyFarmBox%20Ops">Email</a>
      </div>
      <div class="footer-meta">
        <span id="clock" class="clock">--:--</span>
        <span id="dateLine">-- ---</span>
        <span id="footerStatus" class="footer-status">Awaiting secure login</span>
      </div>
    </footer>
  </main>

  <script>
    /* ── SVG icon library – no emoji, renders on all platforms ── */
    const SVGS = {
      harvest:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22V12"/><path d="M5 12c0-3.87 3.13-7 7-7s7 3.13 7 7"/><path d="M5 12H2l3-5 3 5"/><path d="M19 12h3l-3-5-3 5"/><path d="M12 5V2"/></svg>`,
      whatsapp:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M21 11.5a8.38 8.38 0 01-.9 3.8 8.5 8.5 0 01-7.6 4.7 8.38 8.38 0 01-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 01-.9-3.8 8.5 8.5 0 014.7-7.6 8.38 8.38 0 013.8-.9h.5a8.48 8.48 0 018 8v.5z"/></svg>`,
      orders:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><path d="M14 2v6h6"/><path d="M9 13h6M9 17h4"/></svg>`,
      consolidation:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="5" rx="1"/><rect x="14" y="3" width="7" height="5" rx="1"/><rect x="3" y="13" width="7" height="5" rx="1"/><rect x="14" y="13" width="7" height="5" rx="1"/><path d="M10 5.5h4M10 15.5h4M6.5 8v5M17.5 8v5"/></svg>`,
      phone:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07A19.5 19.5 0 013.7 12.5a19.79 19.79 0 01-3-8.53A2 2 0 012.68 2h3a2 2 0 012 1.72 12.84 12.84 0 00.7 2.81 2 2 0 01-.45 2.11L6.91 9.91a16 16 0 006.18 6.18l1.27-1.27a2 2 0 012.11-.45 12.84 12.84 0 002.81.7A2 2 0 0122 16.92z"/></svg>`,
      delivery:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M1 3h15v13H1z"/><path d="M16 8h4l3 4v5h-7V8z"/><circle cx="5.5" cy="18.5" r="2.5"/><circle cx="18.5" cy="18.5" r="2.5"/><path d="M8 18.5h7"/></svg>`,
      attendance:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/><path d="M9 16l2 2 4-4"/></svg>`,
      board:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/><path d="M7 8h10M7 12h6"/></svg>`,
      members:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="7" r="4"/><path d="M2 21c0-4 3.13-7 7-7"/><circle cx="17" cy="11" r="3"/><path d="M14 21c0-3 1.8-5 3-5s3 2 3 5"/></svg>`,
      database:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M21 12c0 1.66-4.03 3-9 3S3 13.66 3 12"/><path d="M3 5v14c0 1.66 4.03 3 9 3s9-1.34 9-3V5"/></svg>`,
      link:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>`
    };
    const ARROW = `<svg class="tool-arrow" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="7" y1="17" x2="17" y2="7"/><polyline points="7 7 17 7 17 17"/></svg>`;

    const ICON_RULES = [
      { re:/harvest/i,              icon:'harvest',       cls:'i-green'},
      { re:/whatsapp/i,             icon:'whatsapp',      cls:'i-teal' },
      { re:/consolidat/i,           icon:'consolidation', cls:'i-navy' },
      { re:/orders?\s*[-–]/i,       icon:'consolidation', cls:'i-navy' },
      { re:/^orders?$/i,            icon:'orders',        cls:'i-navy' },
      { re:/phone\s*order/i,        icon:'phone',         cls:'i-earth'},
      { re:/realtime|delivery.board/i,icon:'board',       cls:'i-gold' },
      { re:/delivery/i,             icon:'delivery',      cls:'i-gold' },
      { re:/attendance/i,           icon:'attendance',    cls:'i-navy' },
      { re:/master.?data/i,         icon:'database',      cls:'i-navy' },
      { re:/member/i,               icon:'members',       cls:'i-navy' },
      { re:/farm.?pickup|pickup/i,  icon:'link',          cls:'i-lime' },
      { re:/website|list.?update/i, icon:'link',          cls:'i-slate'},
    ];
    function resolveIcon(name){
      for(const r of ICON_RULES) if(r.re.test(name)) return r;
      return {icon:'link', cls:'i-slate'};
    }

    /* ── Original script.js logic — untouched ── */
    const LOGIN_API      = "https://script.google.com/macros/s/AKfycbxBI0SbhJVUAv0GM1OuhUN8vbcQVT-26uUPWbcjhIs1fRB-h6awdYZFwAQQSFibL4pKrg/exec";
    const SESSION_KEY    = "mfb_internal_app_session";
    const SESSION_AGE_MS = 8 * 60 * 60 * 1000;
    const AUTO_PIN_LENGTH = 4;

    let deferredPrompt = null, autoLoginTimer = null, isLoggingIn = false;

    const TOOL_META = {
      Harvest:{"label":"Harvest","icon":"🌾","cls":"i-green"},
      WhatsApp:{"label":"WhatsApp","icon":"💬","cls":"i-teal"},
      Orders:{"label":"Orders","icon":"🧾","cls":"i-navy"},
      Consolidation:{"label":"Consolidation","icon":"🧾","cls":"i-navy"},
      "Orders - Consolidation":{"label":"Orders - Consolidation","icon":"🧾","cls":"i-navy"},
      "Phone Orders":{"label":"Phone Orders","icon":"📞","cls":"i-earth"},
      Delivery:{"label":"Delivery","icon":"🚚","cls":"i-gold"},
      Attendance:{"label":"Attendance","icon":"👨‍🌾","cls":"i-earth"},
      "Realtime Delivery Board":{"label":"Realtime Delivery Board","icon":"🛰️","cls":"i-gold"},
      "MFB Members Data":{"label":"MFB Members Data","icon":"👥","cls":"i-navy"},
      "MyFarmBox Master data":{"label":"MyFarmBox Master data","icon":"👥","cls":"i-navy"}
    };
    const APP_URLS = {
      Harvest:"https://script.google.com/macros/s/AKfycby5LYbrTs1YFPpXWztm7f6LINPEieHlHwm2QdcRPCIWVph2dghUuF3n19mxUukGcVYylg/exec",
      WhatsApp:"https://script.google.com/macros/s/AKfycbyTvFFPB2TucM8vOfXgsvtoFwx5xXcwC7WhZKAkWIO1lnZe89uYOry8kjZrvSBVJTpTLA/exec",
      Consolidation:"https://script.google.com/macros/s/AKfycbzkWAwGmERHFu_hvTaybGyJAmtEbBW51j-tm_h75s-FXELHzOrjlLDCc_-tHUVNgvz9/exec",
      Delivery:"https://script.google.com/macros/s/AKfycbz2yba68hKHzxD7I2M_5IgNZn4FNbA2OGYrHfN8C-OaICH-g1E1nU4NWEb2lUGVpOPtsg/exec",
      Attendance:"https://script.google.com/macros/s/AKfycbyknmnotUnNyXwJYYXzypivJelWH5OCN-xOuItppcruYLGLDNRNcCKb7F8dUYgnXP-16w/exec",
      "MFB Members Data":"https://script.google.com/macros/s/AKfycbwuyNPiM84pamuPVDhXpR3uRIAKJWfwyxZE4amVvl1seUT-ZYwpKQPM5ZRgRlo4oljP/exec",
      Orders:"https://script.google.com/macros/s/AKfycbzkWAwGmERHFu_hvTaybGyJAmtEbBW51j-tm_h75s-FXELHzOrjlLDCc_-tHUVNgvz9/exec",
      "Orders - Consolidation":"https://script.google.com/macros/s/AKfycbzkWAwGmERHFu_hvTaybGyJAmtEbBW51j-tm_h75s-FXELHzOrjlLDCc_-tHUVNgvz9/exec",
      "MyFarmBox Master data":"https://script.google.com/macros/s/AKfycbyXYBg7N2PsrGQqyQo85tHAbEDd1RQg8IzWFjClC9-skkg1LIS9ICeuLIouCIAKaJSX/exec"
    };

    const bootLoader   = document.getElementById("bootLoader");
    const overlay      = document.getElementById("overlay");
    const overlayLabel = document.getElementById("overlayLabel");
    const statusToast  = document.getElementById("statusToast");
    const statusText   = document.getElementById("statusText");
    const loginCard    = document.getElementById("loginCard");
    const userCard     = document.getElementById("userCard");
    const toolsGrid    = document.getElementById("toolsGrid");
    const emptyState   = document.getElementById("emptyState");
    const pinInput     = document.getElementById("pinInput");
    const loginBtn     = document.getElementById("loginBtn");
    const clearBtn     = document.getElementById("clearBtn");
    const logoutBtn    = document.getElementById("logoutBtn");
    const errorText    = document.getElementById("errorText");
    const userName     = document.getElementById("userName");
    const userRole     = document.getElementById("userRole");
    const footerStatus = document.getElementById("footerStatus");
    const installBtn   = document.getElementById("installBtn");
    const pinDots      = Array.from(document.querySelectorAll(".pin-dot"));
    const keypadButtons= Array.from(document.querySelectorAll(".numpad-key[data-key]"));

    setTimeout(() => bootLoader.classList.add("hidden"), 900);

    function updateClock() {
      const now = new Date();
      document.getElementById("clock").textContent = now.toLocaleTimeString("en-IN",{hour:"2-digit",minute:"2-digit"});
      document.getElementById("dateLine").textContent = now.toLocaleDateString("en-IN",{day:"2-digit",month:"short"}).toUpperCase();
    }
    updateClock(); setInterval(updateClock, 1000);

    function showOverlay(msg){ overlayLabel.textContent=msg||"Loading"; overlay.classList.add("show"); }
    function hideOverlay()   { overlay.classList.remove("show"); }

    function showToast(msg,type="normal"){
      statusText.textContent=msg;
      statusToast.classList.remove("success","error");
      if(type==="success") statusToast.classList.add("success");
      if(type==="error")   statusToast.classList.add("error");
      statusToast.classList.add("show");
    }
    function hideToast(delay=1200){ setTimeout(()=>statusToast.classList.remove("show","success","error"),delay); }
    function setError(msg){ errorText.textContent=msg||""; }

    function saveSession(payload){ localStorage.setItem(SESSION_KEY,JSON.stringify({ts:Date.now(),payload})); }
    function getSession(){
      try{
        const raw=localStorage.getItem(SESSION_KEY); if(!raw) return null;
        const p=JSON.parse(raw);
        if(!p.ts||Date.now()-p.ts>SESSION_AGE_MS){localStorage.removeItem(SESSION_KEY);return null;}
        return p.payload||null;
      }catch{localStorage.removeItem(SESSION_KEY);return null;}
    }
    function clearSession(){ localStorage.removeItem(SESSION_KEY); }

    function toolMeta(btn){ return TOOL_META[btn.key]||TOOL_META[btn.label]||{label:btn.label||"Tool",icon:"↗",cls:"i-green"}; }

    function normalizeButtons(buttons){
      if(!Array.isArray(buttons)) return [];
      return buttons.map(btn=>{
        const key=(btn.key||btn.label||btn.name||btn.button||btn.BUTTON||btn.buttonName||btn.ButtonName||btn["Button Name"]||btn["App Name"]||"").trim();
        const url=(btn.url||btn.URL||btn.link||btn.Link||btn["App URL"]||btn["Button URL"]||APP_URLS[key]||"").trim();
        const label=(btn.label||btn.name||btn.key||btn.button||btn.BUTTON||btn.buttonName||btn.ButtonName||btn["Button Name"]||btn["App Name"]||"").trim();
        if(!url||!label) return null;
        return{...btn,key:key||label,url,label};
      }).filter(Boolean);
    }

    function ripple(el,evt){
      const rect=el.getBoundingClientRect();
      const node=document.createElement("span");
      node.className="ripple";
      const size=Math.max(rect.width,rect.height);
      node.style.width=size+"px"; node.style.height=size+"px";
      node.style.left=evt.clientX-rect.left-size/2+"px";
      node.style.top=evt.clientY-rect.top-size/2+"px";
      el.appendChild(node); setTimeout(()=>node.remove(),600);
    }

    function syncPinDots(){
      const pin=pinInput.value.trim();
      pinDots.forEach((dot,i)=>{
        dot.classList.toggle("filled",i<pin.length);
        dot.classList.toggle("active",i===Math.min(pin.length,pinDots.length-1)&&pin.length<AUTO_PIN_LENGTH);
      });
    }

    function clearAutoLoginTimer(){ if(!autoLoginTimer)return; clearTimeout(autoLoginTimer); autoLoginTimer=null; }

    function pulsePinError(){
      loginCard.classList.remove("shake"); void loginCard.offsetWidth; loginCard.classList.add("shake");
    }

    function queueAutoLogin(){
      clearAutoLoginTimer(); if(isLoggingIn) return;
      if(pinInput.value.trim().length<AUTO_PIN_LENGTH) return;
      autoLoginTimer=setTimeout(()=>handleLogin(),320);
    }

    function setPinValue(v){ pinInput.value=v.slice(0,12); setError(""); syncPinDots(); queueAutoLogin(); }

    function bindTool(card,label,url){
      card.addEventListener("click",evt=>{
        evt.preventDefault(); ripple(card,evt);
        footerStatus.textContent="Opening "+label;
        showOverlay("Opening"); showToast("Loading "+label+"...");
        setTimeout(()=>{
          window.open(url,"_blank","noopener"); hideOverlay();
          footerStatus.textContent="Tools ready";
          showToast(label+" opened","success"); hideToast(1200);
        },220);
      });
    }

    /* renderButtons — uses SVG icons instead of emoji */
    function renderButtons(buttons){
      const visible=normalizeButtons(buttons);
      toolsGrid.innerHTML="";
      const sl=document.getElementById("sectionLabel");
      if(sl) sl.classList.toggle("hidden",!visible.length);
      if(!visible.length){ emptyState.classList.remove("hidden"); return; }
      emptyState.classList.add("hidden");
      visible.forEach(btn=>{
        const meta=toolMeta(btn);
        const ic=resolveIcon(btn.label||btn.key||"");
        const label=btn.label&&btn.label!==btn.key?btn.label:meta.label;
        const card=document.createElement("a");
        card.href=btn.url; card.className="tool-card "+(ic.cls||meta.cls||"");
        card.target="_blank"; card.rel="noopener"; card.setAttribute("aria-label",label);
        card.innerHTML=`<div class="tool-icon">${SVGS[ic.icon]||SVGS.link}</div><div class="tool-title">${label}</div>${ARROW}`;
        bindTool(card,label,btn.url); toolsGrid.appendChild(card);
      });
    }

    function showLoggedIn(user,buttons){
      loginCard.classList.add("hidden"); userCard.classList.remove("hidden");
      userName.textContent=user.name||"Team User"; userRole.textContent=user.role||"Access active";
      footerStatus.textContent="Secure session active";
      renderButtons(buttons||[]);
    }

    function showLoggedOut(){
      clearAutoLoginTimer(); loginCard.classList.remove("hidden"); userCard.classList.add("hidden");
      const sl=document.getElementById("sectionLabel"); if(sl) sl.classList.add("hidden");
      toolsGrid.innerHTML=""; emptyState.classList.add("hidden");
      footerStatus.textContent="Awaiting secure login"; setPinValue("");
    }

    function setLoggingState(active){ isLoggingIn=active; document.querySelectorAll(".numpad-key").forEach(b=>b.disabled=active); }

    function applyKey(value){
      if(isLoggingIn) return;
      if(value==="clear")    {setPinValue("");return;}
      if(value==="backspace"){setPinValue(pinInput.value.slice(0,-1));return;}
      if(!/^\d$/.test(value)||pinInput.value.length>=12) return;
      setPinValue(pinInput.value+value);
    }

    async function fetchLogin(pin){
      const url=LOGIN_API+"?action=login&pin="+encodeURIComponent(pin);
      const res=await fetch(url,{method:"GET",mode:"cors"});
      if(!res.ok) throw new Error("Network error");
      return await res.json();
    }

    async function handleLogin(){
      const pin=pinInput.value.trim();
      if(!pin||isLoggingIn){
        if(!pin){setError("Enter PIN");showToast("Enter PIN","error");hideToast();pulsePinError();}
        return;
      }
      clearAutoLoginTimer(); setLoggingState(true); setError("");
      showOverlay("Authenticating"); showToast("Verifying PIN...");
      try{
        const data=await fetchLogin(pin);
        if(!data||!data.ok){
          const msg=data&&data.error?data.error:"Invalid PIN";
          setError(msg);showToast(msg,"error");hideOverlay();hideToast(1600);pulsePinError();setLoggingState(false);return;
        }
        const payload={user:data.user||{},buttons:Array.isArray(data.buttons)?data.buttons:[]};
        saveSession(payload); showLoggedIn(payload.user,payload.buttons);
        hideOverlay(); showToast("Ready","success"); hideToast(); setLoggingState(false);
      }catch{
        setError("Unable to connect"); hideOverlay();
        showToast("Unable to connect","error"); hideToast(1600); pulsePinError(); setLoggingState(false);
      }
    }

    loginBtn.addEventListener("click",()=>{clearAutoLoginTimer();handleLogin();});
    clearBtn.addEventListener("click",()=>applyKey("clear"));
    logoutBtn.addEventListener("click",()=>{clearSession();showLoggedOut();});

    pinInput.addEventListener("keydown",evt=>{
      if(evt.key==="Enter")    {evt.preventDefault();clearAutoLoginTimer();handleLogin();return;}
      if(evt.key==="Backspace"){evt.preventDefault();applyKey("backspace");return;}
      if(/^\d$/.test(evt.key)){evt.preventDefault();applyKey(evt.key);}
    });
    pinInput.addEventListener("input",()=>setPinValue(pinInput.value.replace(/\D/g,"")));

    keypadButtons.forEach(btn=>{
      btn.addEventListener("click",evt=>{ripple(btn,evt);applyKey(btn.dataset.key);});
    });
    document.querySelectorAll(".quick-btn").forEach(btn=>{
      btn.addEventListener("click",()=>{showToast("Opening...","success");hideToast(1000);});
    });

    window.addEventListener("beforeinstallprompt",evt=>{
      evt.preventDefault(); deferredPrompt=evt; installBtn.classList.remove("hidden");
    });
    installBtn.addEventListener("click",async()=>{
      if(!deferredPrompt) return;
      deferredPrompt.prompt(); await deferredPrompt.userChoice;
      deferredPrompt=null; installBtn.classList.add("hidden");
    });

    if("serviceWorker" in navigator){
      window.addEventListener("load",()=>navigator.serviceWorker.register("./sw.js").catch(()=>{}));
    }

    const session=getSession();
    if(session&&session.user) showLoggedIn(session.user,session.buttons||[]);
    else showLoggedOut();

    syncPinDots();
  </script>
</body>
</html>
